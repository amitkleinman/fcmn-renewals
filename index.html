<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>מעקב חידוש מנויים</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f2330; --border:#2b3040;
    --text:#e8eaf0; --muted:#9aa3b5; --accent:#f5c518; --accent2:#2dd4a3;
    --danger:#ef5b5b; --row-hover:#22273380;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh;
  }
  header{
    position:sticky; top:0; z-index:5; background:linear-gradient(180deg,#14161c,#14161cee);
    backdrop-filter:blur(6px); padding:16px 20px 0; border-bottom:1px solid var(--border);
  }
  h1{margin:0 0 10px; font-size:20px; display:flex; align-items:center; gap:10px}
  h1 .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding-bottom:12px}
  input[type=text]{
    background:var(--panel2); border:1px solid var(--border); color:var(--text);
    padding:9px 12px; border-radius:8px; font-size:14px; min-width:220px;
  }
  select{
    background:var(--panel2); border:1px solid var(--border); color:var(--text);
    padding:9px 10px; border-radius:8px; font-size:14px;
  }
  .stats{display:flex; gap:14px; flex-wrap:wrap; padding-bottom:12px; font-size:13px; color:var(--muted)}
  .stat b{color:var(--text)}
  .badge{padding:2px 8px;border-radius:999px;font-size:12px;font-weight:600}
  .badge.yes{background:#16332a;color:var(--accent2)}
  .badge.no{background:#332323;color:var(--danger)}

  .group-tabs{display:flex; gap:8px; padding-bottom:10px}
  .group-tab{
    flex:0 0 auto; padding:10px 18px; border-radius:10px; cursor:pointer;
    background:var(--panel2); border:1px solid var(--border);
    color:var(--muted); font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px;
  }
  .group-tab:hover{color:var(--text); border-color:#3b4255}
  .group-tab.active{
    background:var(--accent); color:#14161c; border-color:var(--accent);
  }
  .group-tab .count{font-size:11.5px; font-weight:500; opacity:0.75}

  .tabs{
    display:flex; gap:6px; flex-wrap:wrap; padding-bottom:10px; max-height:120px; overflow-y:auto; scrollbar-width:thin;
  }
  .tab{
    flex:0 0 auto; padding:9px 14px; border-radius:9px; cursor:pointer;
    background:var(--panel); border:1px solid var(--border);
    color:var(--muted); font-size:13.5px; white-space:nowrap;
    display:flex; align-items:center; gap:8px;
  }
  .tab:hover{color:var(--text); border-color:#3b4255}
  .tab.active{
    background:var(--panel2); color:var(--text); border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent) inset;
  }
  .tab .count{font-size:11px; color:var(--muted)}
  .tab .pct{font-size:11px; padding:1px 7px; border-radius:999px; background:#222633; color:var(--accent2)}

  main{padding:0 20px 60px}
  .section-panel{
    border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--panel);
  }
  .section-panel-head{
    display:flex; justify-content:space-between; align-items:center; padding:12px 16px;
    background:var(--panel2);
  }
  .section-panel-head h2{margin:0; font-size:15px}
  .section-panel-head .progress{font-size:13px; color:var(--muted)}

  table{width:100%; border-collapse:collapse; font-size:13.5px}
  thead th{
    text-align:right; padding:8px 12px; color:var(--muted); font-weight:600; font-size:12px;
    border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel);
  }
  tbody td{padding:7px 12px; border-bottom:1px solid #20242f; vertical-align:middle}
  tbody tr:hover{background:var(--row-hover)}
  tbody tr.renewed{background:#10241c33}
  .name{font-weight:600}
  .muted{color:var(--muted); font-size:12.5px}
  .checkbox-cell{text-align:center; width:90px}
  input[type=checkbox]{
    width:20px; height:20px; cursor:pointer; accent-color:var(--accent2);
  }
  .save-indicator{
    position:fixed; bottom:18px; left:18px; background:var(--panel2); border:1px solid var(--border);
    padding:8px 14px; border-radius:8px; font-size:12.5px; color:var(--muted); opacity:0; transition:opacity .25s;
    display:flex; align-items:center; gap:8px;
  }
  .save-indicator.show{opacity:1}
  .save-indicator .ok{color:var(--accent2)}
  .loading{padding:60px; text-align:center; color:var(--muted)}
  mark.hl{background:var(--accent); color:#14161c; padding:0 2px; border-radius:3px}
  .price-groups{display:flex; gap:8px; flex-wrap:wrap; padding-bottom:12px; border-bottom:1px solid var(--border); margin-bottom:10px}
  .price-group{
    flex:0 0 auto; background:var(--panel2); border:1px solid var(--border); border-radius:10px;
    padding:9px 14px; display:flex; flex-direction:column; gap:3px; min-width:140px;
  }
  .price-group .pg-label{font-size:12px; color:var(--muted); font-weight:600}
  .price-group .pg-seats{font-size:13px; color:var(--text); font-weight:600}
  .price-group .pg-stats{font-size:11.5px; color:var(--muted)}
  .price-group .pg-pct{color:var(--accent2); font-weight:600}
  .export-btn{
    background:var(--panel); border:1px solid var(--border); color:var(--text);
    padding:7px 14px; border-radius:8px; cursor:pointer; font-size:12.5px;
  }
  .export-btn:hover{border-color:var(--accent2); color:var(--accent2)}
  .game-panel{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--panel)}
  .game-panel-head{padding:14px 20px;background:var(--panel2);font-size:15px;font-weight:600}
  .game-stats{padding:16px 20px;display:flex;flex-direction:column;gap:8px}
  .game-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #20242f;font-size:14px}
  .game-row:last-child{border-bottom:none;font-weight:700;font-size:15px}
  .game-row .price-label{color:var(--muted)}
  .game-row .price-val{color:var(--text);font-weight:600}
  .modal-overlay{
    display:none; position:fixed; inset:0; background:#000a; z-index:999;
    align-items:center; justify-content:center;
  }
  .modal-overlay.open{display:flex}
  .modal{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    width:90%; max-width:520px; max-height:80vh; display:flex; flex-direction:column;
    overflow:hidden;
  }
  .modal-head{
    padding:16px 20px; background:var(--panel2); display:flex;
    justify-content:space-between; align-items:center; border-bottom:1px solid var(--border);
  }
  .modal-head h3{font-size:15px; margin:0}
  .modal-close{background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer}
  .modal-body{overflow-y:auto; padding:12px 0}
  .modal-row{
    display:flex; gap:10px; padding:8px 20px; font-size:13px;
    border-bottom:1px solid #20242f;
  }
  .modal-row:last-child{border-bottom:none}
  .modal-row .mr-name{flex:1; font-weight:600}
  .modal-row .mr-seat{color:var(--muted); font-size:12px}
  .clickable-badge{cursor:pointer; text-decoration:underline dotted}
  .task-btn{
    position:fixed; bottom:20px; right:20px; width:52px; height:52px;
    border-radius:50%; background:var(--accent); border:none; cursor:pointer;
    font-size:22px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 12px #0006; z-index:100; transition:transform .15s;
  }
  .task-btn:hover{transform:scale(1.1)}
  .task-modal-overlay{
    display:none; position:fixed; inset:0; background:#000a; z-index:200;
    align-items:center; justify-content:center;
  }
  .task-modal-overlay.open{display:flex}
  .task-modal{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    width:90%; max-width:600px; max-height:85vh; display:flex; flex-direction:column;
  }
  .task-modal-head{
    padding:16px 20px; background:var(--panel2); display:flex;
    justify-content:space-between; align-items:center; border-bottom:1px solid var(--border);
    border-radius:14px 14px 0 0;
  }
  .task-modal-head h3{font-size:15px; margin:0; color:var(--text)}
  .task-modal-close{background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer}
  .task-modal-body{overflow-y:auto; padding:16px 20px; flex:1}
  .task-form{display:flex; flex-direction:column; gap:10px; margin-bottom:20px; background:var(--panel2); padding:14px; border-radius:10px; border:1px solid var(--border)}
  .task-form input, .task-form textarea, .task-form select{
    background:var(--bg); border:1px solid var(--border); color:var(--text);
    padding:8px 10px; border-radius:7px; font-size:13px; font-family:inherit;
  }
  .task-form textarea{resize:vertical; min-height:60px}
  .task-form label{font-size:11.5px; color:var(--muted)}
  .task-add-btn{
    background:var(--accent); color:#14161c; border:none; padding:9px 16px;
    border-radius:8px; font-size:13px; font-weight:700; cursor:pointer;
  }
  .task-list{display:flex; flex-direction:column; gap:10px}
  .task-item{
    background:var(--panel2); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px;
  }
  .task-item .task-header{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px}
  .task-item .task-desc{font-size:13.5px; font-weight:600; color:var(--text); flex:1}
  .task-item .task-meta{font-size:11.5px; color:var(--muted); margin-top:4px}
  .task-status{padding:2px 9px; border-radius:999px; font-size:11px; font-weight:600; cursor:pointer; border:none}
  .task-status.open{background:#332323; color:var(--danger)}
  .task-status.progress{background:#2a3320; color:#a3d96c}
  .task-status.done{background:#16332a; color:var(--accent2)}
  .view-toggle{display:flex; gap:4px}
  .view-btn{
    background:var(--panel); border:1px solid var(--border); color:var(--muted);
    padding:5px 10px; border-radius:6px; cursor:pointer; font-size:12px;
  }
  .view-btn.active{background:var(--panel2); color:var(--text); border-color:var(--accent)}
  .seat-map{padding:12px 16px; overflow-x:auto}
  .map-row{display:flex; align-items:center; gap:4px; margin-bottom:4px}
  .map-row-label{width:28px; text-align:center; font-size:10px; color:var(--muted); flex-shrink:0}
  .map-seat{
    width:28px; height:28px; border-radius:5px; border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:8.5px; color:var(--muted); position:relative;
    background:var(--panel2);
  }
  .map-seat.renewed{background:#16332a; border-color:var(--accent2); color:var(--accent2)}
  .map-seat.not-renewed{background:#332323; border-color:var(--danger); color:var(--danger)}
  .map-seat.renew-new-seat{background:#2a3320; border-color:#a3d96c; color:#a3d96c}
  .map-seat.new-buyer{background:#1a2040; border-color:#6c9fd9; color:#6c9fd9}
  .map-seat.empty-seat{background:var(--panel); border-color:#2b3040; color:#3a4055}
  .map-seat .stip{
    display:none; position:absolute; top:calc(100% + 4px); right:50%; transform:translateX(50%);
    background:#22273a; border:1px solid var(--border); border-radius:6px;
    padding:5px 8px; font-size:10px; color:var(--text); white-space:nowrap; z-index:200;
    pointer-events:none;
  }
  .map-seat:hover .stip{display:block}
  .map-stats{font-size:12px; color:var(--muted); padding:8px 16px 4px; display:flex; gap:16px; flex-wrap:wrap}
  .map-legend{font-size:11px; color:var(--muted); padding:4px 16px 12px; display:flex; gap:12px; flex-wrap:wrap}
  .map-legend span{display:flex; align-items:center; gap:4px}
  .map-legend .lb{width:12px;height:12px;border-radius:3px}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2b3040;border-radius:6px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <div style="display:flex; gap:8px; align-items:center; margin-top:4px">

    </div>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="חיפוש לפי שם, אימייל או טלפון...">
    <select id="filter">
      <option value="all">הצג הכל</option>
      <option value="yes">מחודשים בלבד</option>
      <option value="no">לא מחודשים בלבד</option>
    </select>
  </div>
  <div class="stats" id="stats"></div>
  <div class="price-groups" id="priceGroups"></div>
  <div class="group-tabs" id="groupTabs"></div>
  <div class="tabs" id="tabs"></div>
</header>

<main id="main">
  <div class="loading">טוען נתונים...</div>
</main>

<div class="save-indicator" id="saveIndicator">
  <span class="ok">●</span> <span id="saveText">נשמר</span>
</div>

const GROUPS = [
  {id:'lower', label:'יציע תחתון'},
  {id:'upper', label:'יציע עליון'},
  {id:'vip', label:'VIP'},
  {id:'games', label:'משחקים'},
];

function classifyGroup(section){
  const s = String(section);
  if(s.startsWith('1')) return 'lower';
  if(s.startsWith('2')) return 'upper';
  return 'vip'; // PLATINUM, R1, R2, L1, L2, L3
}

function groupBySection(tickets){
  const map = new Map();
  for(const t of tickets){
    if(!map.has(t.section)) map.set(t.section, []);
    map.get(t.section).push(t);
  }
  return map;
}

function naturalSectionSort(a,b){
  return a.localeCompare(b, 'he', {numeric:true, sensitivity:'base'});
}

let unsubscribe = null;
let firstSnapshot = true;
function startLiveSync(){
  unsubscribe = onSnapshot(renewalsDoc, (snap)=>{
    renewals = {};
    if(snap.exists()){
      const data = snap.data();
      for(const [id, val] of Object.entries(data)){
        if(val === true) renewals[id] = true;
      }
    }
    if(firstSnapshot){
      firstSnapshot = false;
      render();
    } else {
      render();
    }
  }, (err)=>{
    console.error('Live sync error', err);
    showError();
  });
}

async function setRenewal(id, value){
  showSaving();
  try{
    await setDoc(renewalsDoc, { [String(id)]: value === true ? true : deleteField() }, {merge: true});
    showSaved();
  }catch(e){
    console.error('save failed', e);
    showError();
  }
}

let saveTimer;
function showSaving(){
  const el = document.getElementById('saveIndicator');
  document.getElementById('saveText').textContent = 'שומר...';
  el.classList.add('show');
}
function showSaved(){
  document.getElementById('saveText').textContent = 'נשמר';
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>el.classList.remove('show'), 1200);
}
function showError(){
  document.getElementById('saveText').textContent = 'שגיאת שמירה';
}

function computeStats(tickets){
  const total = tickets.length;
  const renewed = tickets.filter(t=>renewals[t.id]).length;
  return {total, renewed, left: total-renewed, pct: total? Math.round(renewed/total*100):0};
}

function seatsFor(section){
  return SEATS[section] != null ? SEATS[section] : null;
}

function renderGroupTabs(grouped, sections){
  const el = document.getElementById('groupTabs');
  el.innerHTML = '';
  for(const g of GROUPS){
    // Games group is always shown
    if(g.id === 'games'){
      const tab = document.createElement('div');
      tab.className = 'group-tab' + (g.id===activeGroup ? ' active':'');
      const totalSold = 0; // loaded dynamically
      tab.innerHTML = `<span>${g.label}</span><span class="count">${GAMES.length} משחקים</span>`;
      tab.addEventListener('click', ()=>{
        activeGroup = 'games';
        activeSection = GAMES[0]?.id;
        render();
      });
      el.appendChild(tab);
      continue;
    }
    const groupSections = sections.filter(s=>classifyGroup(s)===g.id);
    if(groupSections.length===0) continue;
    let groupTickets = [];
    let seatTotal = 0, seatKnown = true;
    for(const s of groupSections){
      groupTickets = groupTickets.concat(grouped.get(s));
      const sv = seatsFor(s);
      if(sv == null) seatKnown = false; else seatTotal += sv;
    }
    for(const s of Object.keys(SEATS)){
      if(classifyGroup(s)===g.id && !groupSections.includes(s) && SEATS[s] != null){
        seatTotal += SEATS[s];
      }
    }
    const stats = computeStats(groupTickets);
    const seatsLabel = seatKnown ? `${seatTotal.toLocaleString()} מקומות · ` : '';
    const tab = document.createElement('div');
    tab.className = 'group-tab' + (g.id===activeGroup ? ' active':'');
    tab.innerHTML = `<span>${g.label}</span><span class="count">${seatsLabel}${stats.total} מנויים · ${stats.renewed} חודשו (${stats.pct}%)</span>`;
    tab.addEventListener('click', ()=>{
      activeGroup = g.id;
      activeSection = null;
      render();
    });
    el.appendChild(tab);
  }
}

function renderTabs(grouped, sections){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  const groupSections = sections.filter(s=>classifyGroup(s)===activeGroup);
  for(const section of groupSections){
    const rows = grouped.get(section);
    const stats = computeStats(rows);
    const sv = seatsFor(section);
    const seatsLabel = sv != null ? `${sv} מקומות · ` : '';
    const tab = document.createElement('div');
    tab.className = 'tab' + (section===activeSection ? ' active':'');
    tab.innerHTML = `<span>${escapeHtml(section)}</span><span class="count">${seatsLabel}${stats.total} מנויים</span><span class="pct">${stats.renewed} חודשו (${stats.pct}%)</span>`;
    tab.addEventListener('click', ()=>{
      activeSection = section;
      render();
    });
    tabsEl.appendChild(tab);
  }
}

function renderPanel(grouped, section){
  const main = document.getElementById('main');

  const table = document.createElement('table');

    <thead><tr>

      <th>שם</th>
      <th>שורה</th>
      <th>מושב</th>
      <th>אימייל</th>
      <th>טלפון</th>
    </tr></thead>
    <tbody></tbody>
  `;
  const tbody = table.querySelector('tbody');
  if(visibleRows.length===0){
    tbody.innerHTML = '<tr><td colspan="6" class="loading">לא נמצאו תוצאות</td></tr>';
  }

    const tr = document.createElement('tr');

      <td class="muted">${escapeHtml(t.email)}</td>
      <td class="muted">${escapeHtml(t.phone)}</td>

    tbody.appendChild(tr);
  }
  table.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', async (e)=>{
      const id = e.target.getAttribute('data-id');
      const value = e.target.checked;
      renewals[id] = value;
      e.target.closest('tr').classList.toggle('renewed', value);
      const grouped2 = groupBySection(TICKETS);
      const sections2 = Array.from(grouped2.keys()).sort(naturalSectionSort);
      updateStatsBar();
      const newStats = computeStats(rows);
      const progEl = document.getElementById('panelProgress');
      if(progEl) progEl.textContent = `${newStats.renewed}/${newStats.total} חודשו (${newStats.pct}%)`;
      renderGroupTabs(grouped2, sections2);
      renderTabs(grouped2, sections2);
      renderPriceGroups(grouped2);
      const mc = document.getElementById('mapView');
      if(mc && mc.style.display !== 'none') refreshSeatMap(section, mc);
      await setRenewal(id, value);
    });
  });

  tableContainer.appendChild(table);
  panel.appendChild(tableContainer);

  // Seating map view
  const mapContainer = document.createElement('div');
  mapContainer.id = 'mapView';
  mapContainer.style.display = 'none';
  if(hasMap) buildSeatMap(section, mapContainer);
  panel.appendChild(mapContainer);

  // Toggle logic
  if(hasMap){
    head.querySelector('#btnTable').addEventListener('click', ()=>{
      currentView = 'table';
      tableContainer.style.display = '';
      mapContainer.style.display = 'none';
      head.querySelector('#btnTable').classList.add('active');
      head.querySelector('#btnMap').classList.remove('active');
    });
    head.querySelector('#btnMap').addEventListener('click', ()=>{
      currentView = 'map';
      tableContainer.style.display = 'none';
      mapContainer.style.display = '';

  main.appendChild(panel);

  mapDiv.className = 'seat-map';
  mapDiv.id = `mapGrid_${section}`;
  container.appendChild(mapDiv);

  refreshSeatMap(section, container);
}

function refreshSeatMap(section, container){
  const data = MAP_DATA[section];
  if(!data) return;
  // Build lookup by row|seat
  const seatMap = new Map();
  data.seats.forEach(s => seatMap.set(`${s.row}|${s.seat}`, s));

  const mapDiv = container.querySelector(`#mapGrid_${section}`);
  if(!mapDiv) return;
  mapDiv.innerHTML = '';

  let renewed = 0;
  const ticketSeats = data.seats.filter(s=>s.has_ticket);
  const total = ticketSeats.length;

  const allSeatNums = data.all_seats;

  data.rows.forEach(rowNum => {
    const seatsInRow = data.seats.filter(s=>s.row===rowNum);
    if(seatsInRow.length === 0) return;
    const rowSeatNums = new Set(seatsInRow.map(s=>s.seat));

    const rowDiv = document.createElement('div');
    rowDiv.className = 'map-row';
    const label = document.createElement('div');
    label.className = 'map-row-label';
    label.textContent = `ש׳ ${rowNum}`;
    rowDiv.appendChild(label);

    allSeatNums.forEach(s => {
      const cell = document.createElement('div');
      if(!rowSeatNums.has(s)){
        // Seat doesn't exist in this row — invisible spacer
        cell.className = 'map-seat';
        cell.style.cssText = 'background:transparent;border-color:transparent;pointer-events:none';
      } else {
        const t = seatMap.get(`${rowNum}|${s}`);
        const ssKey = `${section}|${rowNum}|${s}`;
        const ss = liveSeatStatus[ssKey]; // {status: 'renew'|'new', name} or undefined

        if(t.has_ticket){
          // Last-season ticket holder
          const isRenewed = !!renewals[String(t.id)];
          if(isRenewed) renewed++;
          cell.className = 'map-seat ' + (isRenewed ? 'renewed' : 'not-renewed');
          cell.textContent = s;
          const tip = document.createElement('div');
          tip.className = 'stip';
          tip.textContent = `${t.name} · מושב ${s}`;
          cell.appendChild(tip);
        } else if(ss) {
          // New seat this season (not in last season data)
          if(ss.status === 'renew') renewed++;
          cell.className = 'map-seat ' + (ss.status === 'renew' ? 'renew-new-seat' : 'new-buyer');
          cell.textContent = s;
          const tip = document.createElement('div');
          tip.className = 'stip';
          tip.textContent = `${ss.name} · מושב ${s} · ${ss.status === 'renew' ? 'חידש (מושב חדש)' : 'מנוי חדש'}`;
          cell.appendChild(tip);
        } else {
          // Physical seat, no ticket this season
          cell.className = 'map-seat empty-seat';
          cell.textContent = s;
        }
      }
      rowDiv.appendChild(cell);
    });
    mapDiv.appendChild(rowDiv);
  });

  const cap = data.capacity;
  const ns = data.new_season;
  const capPct = Math.round(ns/cap*100);
  const renewPct = Math.round(renewed/total*100);
  const statsDiv = container.querySelector(`#mapStats_${section}`);
  if(statsDiv) statsDiv.innerHTML =
    `<span><b>${cap}</b> מקומות</span>` +
    `<span>תכולת יציע: <b style="color:var(--accent)">${ns}/${cap} (${capPct}%)</b></span>` +
    `<span>מנויים שנה שעברה: <b>${total}</b></span>` +
    `<span>חידשו: <b style="color:var(--accent2)">${renewed}</b></span>` +
    `<span>לא חידשו: <b style="color:var(--danger)">${total-renewed}</b></span>` +
    `<span>אחוז חידוש: <b>${renewPct}%</b></span>`;
}

function render(){
  const grouped = groupBySection(TICKETS);
  for(const s of Object.keys(SEATS)){
    if(!grouped.has(s)) grouped.set(s, []);
  }
  const sections = Array.from(grouped.keys()).sort(naturalSectionSort);

  if(!activeGroup){
    activeGroup = GROUPS.find(g=>sections.some(s=>classifyGroup(s)===g.id))?.id || 'lower';
  }

  // Handle games group separately
  if(activeGroup === 'games'){
    renderGroupTabs(grouped, sections);
    document.getElementById('tabs').innerHTML = '';
    // Show game sub-tabs
    const tabsEl = document.getElementById('tabs');
    GAMES.forEach(game=>{
      const tab = document.createElement('div');
      tab.className = 'tab' + (activeSection===game.id?' active':'');
      tab.innerHTML = `<span>${escapeHtml(game.name)}</span>`;
      tab.addEventListener('click', ()=>{ activeSection=game.id; render(); });
      tabsEl.appendChild(tab);
    });
    if(!activeSection || !GAMES.find(g=>g.id===activeSection)){
      activeSection = GAMES[0]?.id;
    }
    renderPriceGroups(grouped);
    if(activeSection) renderGamePanel(activeSection);
    updateStatsBar();
    return;
  }

  const groupSections = sections.filter(s=>classifyGroup(s)===activeGroup);
  if(!activeSection || !groupSections.includes(activeSection)){
    activeSection = groupSections[0];
  }

  renderGroupTabs(grouped, sections);
  renderTabs(grouped, sections);
  renderPriceGroups(grouped);

  const searchTerm = document.getElementById('search').value.trim();
  if(searchTerm){
    renderGlobalSearch(grouped, sections, searchTerm);
  } else {
    renderPanel(grouped, activeSection);
  }
  updateStatsBar();
}

function highlightText(text, term){
  const s = String(text);
  if(!term) return escapeHtml(s);
  const idx = s.toLowerCase().indexOf(term.toLowerCase());
  if(idx === -1) return escapeHtml(s);
  return escapeHtml(s.slice(0,idx)) + '<mark class="hl">' + escapeHtml(s.slice(idx, idx+term.length)) + '</mark>' + escapeHtml(s.slice(idx+term.length));
}

function renderGlobalSearch(grouped, sections, term){
  const main = document.getElementById('main');
  main.innerHTML = '';
  const filter = document.getElementById('filter').value;
  const lower = term.toLowerCase();

  const matchesBySection = [];
  for(const section of sections){
    const rows = (grouped.get(section)||[]).filter(t=>{
      if(filter==='yes' && !renewals[t.id]) return false;
      if(filter==='no' && renewals[t.id]) return false;
      const hay = (t.name+' '+t.email+' '+t.phone).toLowerCase();
      return hay.includes(lower);
    });
    if(rows.length) matchesBySection.push({section, rows: rows.sort((a,b)=>a.row-b.row||a.seat-b.seat)});
  }

  const totalMatches = matchesBySection.reduce((sum,g)=>sum+g.rows.length,0);
  const totalSections = matchesBySection.length;

  if(totalMatches===0){
    main.innerHTML = '<div class="loading">לא נמצאו תוצאות בכל העמדות</div>';
    return;
  }

  const summary = document.createElement('div');
  summary.style.cssText = 'padding:10px 4px 14px; font-size:13px; color:var(--muted)';
  summary.textContent = totalSections > 1
    ? `נמצאו ${totalMatches} תוצאות ב-${totalSections} עמדות שונות`
    : `נמצאו ${totalMatches} תוצאות בעמדה ${matchesBySection[0].section}`;
  main.appendChild(summary);

  for(const group of matchesBySection){
    const panel = document.createElement('div');
    panel.className = 'section-panel';
    panel.style.marginBottom = '14px';

    const head = document.createElement('div');
    head.className = 'section-panel-head';
    head.style.cursor = 'pointer';
    head.innerHTML = `<h2>${escapeHtml(group.section)} <span class="muted">(${group.rows.length} תוצאות)</span></h2>`;
    head.addEventListener('click', ()=>{
      activeGroup = classifyGroup(group.section);
      activeSection = group.section;
      document.getElementById('search').value = '';
      render();
    });
    panel.appendChild(head);

    const table = document.createElement('table');
    table.innerHTML = `
      <thead><tr>
        <th class="checkbox-cell">חידוש</th>
        <th>שם</th>
        <th>שורה</th>
        <th>מושב</th>
        <th>אימייל</th>
        <th>טלפון</th>
      </tr></thead>
      <tbody></tbody>
    `;
    const tbody = table.querySelector('tbody');
    for(const t of group.rows){
      const tr = document.createElement('tr');
      const checked = !!renewals[t.id];
      if(checked) tr.classList.add('renewed');
      tr.innerHTML = `
        <td class="checkbox-cell"><input type="checkbox" data-id="${t.id}" data-section="${escapeHtml(group.section)}" ${checked?'checked':''}></td>
        <td class="name">${highlightText(t.name, term)}</td>
        <td>${t.row}</td>
        <td>${t.seat}</td>
        <td class="muted">${highlightText(t.email, term)}</td>
        <td class="muted">${highlightText(t.phone, term)}</td>
      `;
      tbody.appendChild(tr);
    }
    table.querySelectorAll('input[type=checkbox]').forEach(cb=>{
      cb.addEventListener('click', e=>e.stopPropagation());
      cb.addEventListener('change', async (e)=>{
        const id = e.target.getAttribute('data-id');
        const value = e.target.checked;
        renewals[id] = value;
        e.target.closest('tr').classList.toggle('renewed', value);
        updateStatsBar();
        const grouped2 = groupBySection(TICKETS);
        for(const s of Object.keys(SEATS)){ if(!grouped2.has(s)) grouped2.set(s, []); }
        const sections2 = Array.from(grouped2.keys()).sort(naturalSectionSort);
        renderGroupTabs(grouped2, sections2);
        renderPriceGroups(grouped2);
        await setRenewal(id, value);
      });
    });
    panel.appendChild(table);
    main.appendChild(panel);
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const NEW_BUYERS_COUNT = 91; // updated from Firestore meta
const TOTAL_REVENUE = 958080;
const LAST_UPDATED = '15/07/2026 22:17';
const TOTAL_NEW_SEASON = 1035;

// Override with live Firestore meta if available
let liveMeta = {
  totalNewSeason: TOTAL_NEW_SEASON,
  newBuyers: NEW_BUYERS_COUNT,
  totalRevenue: TOTAL_REVENUE,
  lastUpdated: LAST_UPDATED,
  newBuyersList: [],
  kasherCount: 8,
  kasherRevenue: 4800,
  netanyaRevenue: 0
};

let liveSeatStatus = {}; // key: "section|row|seat" → {status, name}

(async function loadMeta(){
  try{
    const snap = await getDoc(doc(db,'meta','stats'));
    if(snap.exists()){
      const d = snap.data();
      // Use max of Firestore and hardcoded to prevent bad data from overriding
      liveMeta.totalNewSeason = Math.max(d.totalNewSeason ?? 0, TOTAL_NEW_SEASON);
      liveMeta.newBuyers = Math.max(d.newBuyers ?? 0, NEW_BUYERS_COUNT);
      liveMeta.totalRevenue = Math.max(d.totalRevenue ?? 0, TOTAL_REVENUE);
      liveMeta.lastUpdated = d.lastUpdated && d.totalNewSeason >= TOTAL_NEW_SEASON ? d.lastUpdated : LAST_UPDATED;
      liveMeta.newBuyersList = d.newBuyersList ?? [];
      liveMeta.kasherCount = d.kasherCount ?? 8;
      liveMeta.kasherRevenue = d.kasherRevenue ?? 4800;
      updateStatsBar();
    }
    const snapSS = await getDoc(doc(db,'meta','seatStatus'));
    if(snapSS.exists()){
      liveSeatStatus = snapSS.data();
      // Refresh map if currently open
      const mc = document.getElementById('mapView');
      if(mc && mc.style.display !== 'none' && activeSection) refreshSeatMap(activeSection, mc);
    }
    // Fetch שולם בנתניה from Google Sheet
    try{
      const sheetId = '18AG7QWkuY9I5cdlRhf7guWjSH1yNl5j4-DqKF-TWoVA';
      const sheetName = encodeURIComponent('שולם בנתניה');
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
      const resp = await fetch(csvUrl);
      if(resp.ok){
        const text = await resp.text();
        const rows = text.split('\n').slice(1); // skip header
        let sum = 0;
        for(const row of rows){
          const cols = row.split(',');
          if(cols.length >= 3){
            const val = cols[2].replace(/[",₪\s]/g,'').trim();
            const num = parseFloat(val);
            if(!isNaN(num)) sum += num;
          }
        }
        liveMeta.netanyaRevenue = Math.round(sum);
        updateStatsBar();
      }
    }catch(e){ console.error('sheet fetch failed', e); }

let gamesModalData = []; // cache loaded game data

async function loadGameModal(gameId){
  const body = document.getElementById('gamesModalBody');
  body.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px">טוען...</div>';

  // Find game config
  const game = gamesModalData.find(g=>g.id===gameId) || GAMES.find(g=>g.id===gameId);
  const title = document.getElementById('gamesModalTitle');
  const subtitle = document.getElementById('gamesModalSubtitle');
  title.textContent = `⚽ ${game?.name||'משחק'}`;
  subtitle.textContent = [game?.date, game?.opponent ? `נגד ${game.opponent}` : ''].filter(Boolean).join(' · ');

  const snap = await getDoc(doc(db,'games',gameId));
  const data = snap.exists() ? snap.data() : {};
  body.innerHTML = '';

  const sectionRows = [
    {label:'🏟 מערבי תחתון',val:data.westernLower||0,rev:data.westernLowerRevenue||0},
    {label:'🏟 מערבי עליון',val:data.westernUpper||0,rev:data.westernUpperRevenue||0},
    {label:'⭐ כבוד',val:data.honor||0,rev:data.honorRevenue||0},
    {label:'♿ מונגש',val:data.mongash||0,rev:data.mongashRevenue||0},
  ];
  const ordersList = data.ordersList||[];
  const ordersCount = data.ordersCount||0;

  const wrap = document.createElement('div');

  if(!data.total){
    wrap.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px">אין נתונים עדיין</div>';
  } else {
    sectionRows.forEach(r=>{
      const row=document.createElement('div');
      row.style.cssText='display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid #20242f';
      row.innerHTML=`<span style="color:var(--muted)">${r.label}</span><span>${r.val} כרטיסים${r.rev>0?` · ₪${r.rev.toLocaleString()}`:''}</span>`;
      wrap.appendChild(row);
    });

    // הזמנות clickable
    const ordersRow=document.createElement('div');
    ordersRow.style.cssText='display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid #20242f;cursor:pointer';
    ordersRow.innerHTML=`<span style="color:var(--muted)">📋 הזמנות</span><span style="color:var(--accent2);text-decoration:underline dotted">${ordersCount} כרטיסים ▾</span>`;
    wrap.appendChild(ordersRow);

    const listEl=document.createElement('div');
    listEl.style.cssText='display:none;background:var(--bg);border-radius:6px;padding:8px;margin:4px 0;font-size:12px;max-height:180px;overflow-y:auto';
    // Helper to translate category to יציע label
    function catToYitzia(cat){
      if(!cat) return '';
      const c = String(cat).trim();
      if(c.charAt(0)==='1') return 'מערבי תחתון';
      if(c.charAt(0)==='2') return 'מערבי עליון';
      return 'כבוד';
    }
    if(ordersList.length===0){ listEl.innerHTML='<div style="color:var(--muted)">אין הזמנות</div>'; }
    else {
      // Header row
      const hdr=document.createElement('div');
      hdr.style.cssText='display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid #2b3040;font-weight:600';
      hdr.innerHTML='<span>שם</span><span>יציע</span>';
      listEl.appendChild(hdr);
      ordersList.forEach((item,i)=>{ const name=typeof item==='object'?item.name:item; const cat=typeof item==='object'?item.category:''; const yitzia=catToYitzia(cat); const d=document.createElement('div'); d.style.cssText='padding:3px 0;border-bottom:1px solid #20242f;display:flex;justify-content:space-between'; d.innerHTML=`<span>${i+1}. ${escapeHtml(name)}</span><span style="color:var(--muted);font-size:11px">${escapeHtml(yitzia)}</span>`; listEl.appendChild(d); });
    }
    wrap.appendChild(listEl);

    // Export button for הזמנות
    if(ordersList.length > 0){
      const exportBtn = document.createElement('button');
      exportBtn.style.cssText = 'margin-top:6px;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px;display:none';
      exportBtn.textContent = '📥 ייצא הזמנות לאקסל';
      wrap.appendChild(exportBtn);

      ordersRow.addEventListener('click',()=>{
        const open = listEl.style.display==='none';
        listEl.style.display = open ? 'block' : 'none';
        exportBtn.style.display = open ? 'inline-block' : 'none';
      });

      exportBtn.addEventListener('click', ()=>{
        const gameName = document.getElementById('gamesModalTitle').textContent.replace('⚽ ','');
        const rows = [['#','שם','יציע']];
        ordersList.forEach((item,i)=>{
          const name = typeof item==='object'?item.name:item;
          const cat = typeof item==='object'?item.category:'';
          let yitzia='';
          if(cat){const c=String(cat).trim();yitzia=c.charAt(0)==='1'?'מערבי תחתון':c.charAt(0)==='2'?'מערבי עליון':'כבוד';}
          rows.push([i+1, name, yitzia]);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'הזמנות');
        XLSX.writeFile(wb, `הזמנות_${gameName}.xlsx`);
      });
    } else {
      ordersRow.addEventListener('click',()=>{ listEl.style.display=listEl.style.display==='none'?'block':'none'; });
    }

    const totalRow=document.createElement('div');
    totalRow.style.cssText='display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding:10px 0 0';
    totalRow.innerHTML=`<span>סה"כ</span><span style="color:var(--accent2)">${data.total||0} כרטיסים${data.totalRevenue>0?` · ₪${data.totalRevenue.toLocaleString()}`:''}  </span>`;
    wrap.appendChild(totalRow);
  }
  body.appendChild(wrap);
}

document.getElementById('gamesBtn').addEventListener('click', async ()=>{
  const modal = document.getElementById('gamesModal');
  modal.style.display = 'flex';

  // Load games from gamesConfig collection + fallback to GAMES array
  try{
    const snaps = await getDocs(collection(db,'gamesConfig'));
    gamesModalData = [];
    snaps.forEach(d=>gamesModalData.push({id:d.id,...d.data()}));
    gamesModalData.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  }catch(e){ gamesModalData = []; }

  // Merge with hardcoded GAMES if not in gamesConfig
  const allGames = [...gamesModalData];
  for(const g of GAMES){ if(!allGames.find(x=>x.id===g.id)) allGames.push(g); }

  const sel = document.getElementById('gamesModalSelect');
  sel.innerHTML = allGames.map(g=>`<option value="${g.id}">${escapeHtml(g.name||g.id)}${g.opponent?' · נגד '+escapeHtml(g.opponent):''}</option>`).join('');

  if(allGames.length>0) await loadGameModal(allGames[0].id);
  sel.addEventListener('change', ()=>loadGameModal(sel.value));
});

document.getElementById('taskAddBtn').addEventListener('click', async ()=>{
  const opener = document.getElementById('taskOpener').value.trim();
  const assignee = document.getElementById('taskAssignee').value.trim();
  const desc = document.getElementById('taskDesc').value.trim();
  if(!desc){ alert('יש להזין תיאור משימה'); return; }

  const now = new Date();
  const dateStr = now.toLocaleDateString('he-IL', {day:'2-digit',month:'2-digit',year:'numeric'});

  await addDoc(tasksCol, {
    opener, assignee, desc,
    status: 'open',
    openedAt: dateStr,
    createdTs: now.getTime()
  });

  document.getElementById('taskDesc').value = '';
  loadTasks();
});

async function loadTasks(){
  const list = document.getElementById('taskList');
  list.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">טוען...</div>';
  try{
    const snap = await getDocs(query(tasksCol, orderBy('createdTs','desc')));
    if(snap.empty){ list.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">אין משימות עדיין</div>'; return; }
    list.innerHTML = '';
    snap.forEach(docSnap=>{
      const t = docSnap.data();
      const id = docSnap.id;
      const statusLabels = {open:'פתוח', progress:'הועבר לטיפול', done:'הושלם'};
      const item = document.createElement('div');
      item.className = 'task-item';
      item.innerHTML = `
        <div class="task-header">
          <div class="task-desc">${escapeHtml(t.desc)}</div>
          <button class="task-status ${t.status}" data-id="${id}" data-status="${t.status}">${statusLabels[t.status]||t.status}</button>
        </div>
        <div class="task-meta">
          📅 ${t.openedAt} · 👤 ${escapeHtml(t.opener||'לא צוין')} · ➡️ ${escapeHtml(t.assignee||'לא צוין')}
        </div>`;
      item.querySelector('.task-status').addEventListener('click', async (e)=>{
        const statuses = ['open','progress','done'];
        const cur = e.target.getAttribute('data-status');
        const next = statuses[(statuses.indexOf(cur)+1) % statuses.length];
        await updateDoc(doc(db,'tasks',id), {status: next});
        loadTasks();
      });
      list.appendChild(item);
    });
  }catch(e){ list.innerHTML = `<div style="color:var(--danger);padding:20px">${e.message}</div>`; }
}
