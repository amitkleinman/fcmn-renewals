<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חניון מכבי נתניה</title>
<style>
  :root{--bg:#0f1115;--panel:#171a21;--panel2:#1f2330;--border:#2b3040;--text:#e8eaf0;--muted:#9aa3b5;--accent:#f5c518;--accent2:#2dd4a3;--danger:#ef5b5b;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"Segoe UI",Arial,sans-serif;min-height:100vh;padding:20px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
  h1{font-size:20px;display:flex;align-items:center;gap:10px}
  h1 .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .back-link{color:var(--muted);text-decoration:none;font-size:13px;border:1px solid var(--border);padding:6px 12px;border-radius:7px}
  .back-link:hover{color:var(--text)}
  .zones-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .zone-tab{padding:9px 18px;border-radius:9px;cursor:pointer;background:var(--panel);border:1px solid var(--border);color:var(--muted);font-size:14px;font-weight:600}
  .zone-tab.active{background:var(--accent);color:#14161c;border-color:var(--accent)}
  .zone-tab:hover:not(.active){color:var(--text);border-color:#3b4255}
  .stats-bar{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:20px;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-radius:10px}
  .parking-map{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;display:inline-block;min-width:300px}
  .parking-map h2{font-size:14px;color:var(--muted);margin-bottom:20px;font-weight:600}
  .lot{display:flex;flex-direction:column;gap:10px}
  .lot-row{display:flex;gap:6px;align-items:center}
  .row-label{font-size:11px;color:var(--muted);width:52px;text-align:right;flex-shrink:0;padding-left:8px}
  .spot{width:40px;height:40px;border-radius:7px;border:2px solid var(--accent);background:#2a2500;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--accent);cursor:default;position:relative;transition:transform .1s;flex-shrink:0}
  .spot:hover{transform:scale(1.12);z-index:10}
  .spot.taken{background:#332323;border-color:var(--danger);color:var(--danger)}
  .spot.accessible{border-style:dashed}
  .spot .tip{display:none;position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);background:#22273a;border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:10.5px;color:var(--text);white-space:nowrap;z-index:200;pointer-events:none;box-shadow:0 2px 8px #0004}
  .spot:hover .tip{display:block}
  .spot-gap{width:20px;flex-shrink:0}
  .legend{display:flex;gap:14px;margin-top:20px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend .lb{width:14px;height:14px;border-radius:3px;border:2px solid}
  .coming-soon{display:flex;align-items:center;justify-content:center;height:180px;color:var(--muted);font-size:14px;border:1px dashed var(--border);border-radius:12px;max-width:500px}
</style>
</head>

        {n:9,accessible:false},{n:11,accessible:false},
        {n:13,accessible:false},{n:15,accessible:false},
        {n:17,accessible:false},{n:19,accessible:false},
        {n:21,accessible:false},{n:23,accessible:false},
        {n:25,accessible:false},{n:27,accessible:false},
        null,
        {n:37,accessible:false},{n:39,accessible:false},
        {n:41,accessible:false},{n:43,accessible:false}
      ]
    }
  ]
};

function renderZone(zoneData) {
  const content = document.getElementById('zoneContent');
  content.innerHTML = '';
  let taken = 0;

  const map = document.createElement('div');
  map.className = 'parking-map';

  const title = document.createElement('h2');
  title.textContent = '🅿️ ' + zoneData.name + ' · ' + zoneData.total + ' מקומות';
  map.appendChild(title);

  const lot = document.createElement('div');
  lot.className = 'lot';

  zoneData.rows.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'lot-row';

    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.textContent = row.label;
    rowEl.appendChild(lbl);

    row.spots.forEach(s => {
      if (!s) {
        const gap = document.createElement('div');
        gap.className = 'spot-gap';
        rowEl.appendChild(gap);
        return;
      }
      const spotInfo = parkingStatus[String(s.n)];
      const isTaken = s.taken || !!spotInfo;
      const el = document.createElement('div');
      el.className = 'spot' + (isTaken ? ' taken' : '') + (s.accessible ? ' accessible' : '');
      el.textContent = s.n;
      if (isTaken) taken++;

      const tip = document.createElement('div');
      tip.className = 'tip';
      tip.textContent = isTaken
        ? (spotInfo?.name || s.name || 'תפוס') + (spotInfo?.email ? ' · ' + spotInfo.email : '')
        : 'מקום ' + s.n + (s.accessible ? ' · נגיש ♿' : '');
      el.appendChild(tip);
      rowEl.appendChild(el);
    });

    lot.appendChild(rowEl);
  });

  map.appendChild(lot);

  const legend = document.createElement('div');
  legend.className = 'legend';
  legend.innerHTML = `
    <span><span class="lb" style="border-color:var(--accent);background:#2a2500"></span> פנוי</span>
    <span><span class="lb" style="border-color:var(--danger);background:#332323"></span> תפוס</span>
    <span><span class="lb" style="border-color:var(--accent);border-style:dashed;background:#2a2500"></span> נגיש ♿</span>
  `;
  map.appendChild(legend);
  content.appendChild(map);

  document.getElementById('takenCount').textContent = taken;
  document.getElementById('freeCount').textContent = zoneData.total - taken;
  document.getElementById('totalCount').textContent = zoneData.total;
}

function renderComingSoon(label) {
  document.getElementById('zoneContent').innerHTML =
    `<div class="coming-soon">🅿️ ${label} — בקרוב</div>`;
  document.getElementById('takenCount').textContent = '—';
  document.getElementById('freeCount').textContent = '—';
  document.getElementById('totalCount').textContent = '—';
}

document.querySelectorAll('area[data-zone]').forEach(area => {
  area.addEventListener('click', (e) => {
    e.preventDefault();
    const zone = area.getAttribute('data-zone');
    const tab = document.querySelector(`.zone-tab[data-zone="${zone}"]`);
    if (tab) tab.click();
    tab?.scrollIntoView({behavior:'smooth', block:'nearest'});
  });
});

document.querySelectorAll('#mapA, #mapB, #mapC, #mapD, #mapT').forEach(el => {
  el.addEventListener('mouseenter', () => { el.querySelector('path').style.fillOpacity = '1'; });
  el.addEventListener('mouseleave', () => { el.querySelector('path').style.fillOpacity = '0.75'; });
  el.addEventListener('click', () => {
    const zone = el.getAttribute('data-zone');
    const tab = document.querySelector(`.zone-tab[data-zone="${zone}"]`);
    if (tab) tab.click();
  });
});

document.querySelectorAll('.zone-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.zone-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const z = tab.getAttribute('data-zone');
    if (z === 'A') renderZone(PARKING_A);
    else if (z === 'B') renderZone(PARKING_B);
    else if (z === 'C') renderZone(PARKING_C);
    else if (z === 'D') renderZone(PARKING_D);
    else if (z === 'T') renderZone(PARKING_T);
    else renderComingSoon('חניה ' + z);
  });
});

renderZone(PARKING_A);
</script>
</body>
</html>
